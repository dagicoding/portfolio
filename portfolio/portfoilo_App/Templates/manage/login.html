{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Portal</title>
    <style>
      /* Reset and Base Styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
      }

      body {
        background-color: #152330; /* Your Main Color */
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #ffffff;
      }

      /* Login Card */
      .login-container {
        background: rgba(255, 255, 255, 0.03);
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        border: 1px solid rgba(255, 255, 255, 0.1);
        width: 100%;
        max-width: 400px;
        text-align: center;
        backdrop-filter: blur(10px);
      }

      h1 {
        margin-bottom: 24px;
        font-weight: 600;
        letter-spacing: -0.5px;
        color: #f8f9fa;
      }

      /* Error Message */
      .error-msg {
        background: rgba(255, 71, 71, 0.1);
        color: #ff4747;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 0.9rem;
        border: 1px solid rgba(255, 71, 71, 0.2);
      }

      /* Form Styling */
      form {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      input {
        width: 100%;
        padding: 14px;
        border-radius: 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: rgba(255, 255, 255, 0.05);
        color: #fff;
        outline: none;
        transition: all 0.3s ease;
      }

      input:focus {
        border-color: #4a90e2;
        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 0 8px rgba(74, 144, 226, 0.3);
      }

      button {
        padding: 14px;
        border-radius: 8px;
        border: none;
        background: #ffffff;
        color: #152330;
        font-weight: 700;
        cursor: pointer;
        transition:
          transform 0.2s,
          background 0.3s;
        margin-top: 10px;
      }

      button:hover {
        background: #e2e2e2;
        transform: translateY(-2px);
      }

      button:active {
        transform: translateY(0);
      }

      /* Subtle branding */
      .footer-text {
        margin-top: 20px;
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.4);
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h1>Welcome Back</h1>

      {% if error %}
      <div class="error-msg">{{ error }}</div>
      {% endif %}

      <form action="{% url 'login' %}" method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />
        <button type="submit">Login</button>
      </form>

      <div class="footer-text">Protected Access Only</div>
    </div>
  </body>
</html>
